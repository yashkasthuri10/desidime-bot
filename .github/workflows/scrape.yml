name: Scrape DesiDime Deals

on:
  schedule:
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch:

# Prevent overlapping runs
concurrency:
  group: scrape-deals
  cancel-in-progress: false

# Grant write permission so git push works
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm" # This caches the Node_modules to speed up npm ci

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        # Playwright will skip downloading the binaries if they are restored from the cache.
        # It will still execute slightly to install necessary OS dependencies (--with-deps).
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL: ${{ secrets.CHANNEL }}
          AFFILIATE_TAG: ${{ secrets.AFFILIATE_TAG }}
        run: node index.js

      - name: Commit updated posted.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json
          git diff --cached --quiet || git commit -m "Update posted deals"
          git push
